    <header>
        <span class="logo"><i class="bi bi-chat-right-quote logo-icon"></i>Frases del día</span>

            <h1>Frases del día</h1>
            <div class="frase-container">

                <p id="frase" class="frase">"El éxito es la suma de pequeños esfuerzos repetidos día tras día."</p>
                <i class="bi bi-quote end-quote"></i>
            </div>
            
        </div>
        <span id="autor" class="autor">Robert Collier</span>

        <button id="nueva-frase"><i class="bi bi-arrow-clockwise"></i> Ver otra frase</button>

        
    </main>
    <footer>
        <span>Creado por <strong>Nidilson Rodríguez</strong></span>

    </footer
